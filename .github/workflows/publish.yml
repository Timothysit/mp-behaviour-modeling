name: Publish Quarto Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install Python dependencies
        run: |
          uv venv
          uv pip install -e .
          uv pip install ssm@git+https://github.com/lindermanlab/ssm.git
          uv pip install ipykernel
          source .venv/bin/activate
          python -m ipykernel install --user --name mp-behaviour-modeling

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: |
          source .venv/bin/activate
          quarto render

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
